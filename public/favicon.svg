<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1054"/>
      <stop offset="100%" stop-color="#4a1a6b"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="gGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <radialGradient id="gEyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0d060" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark purple background -->
  <circle cx="32" cy="32" r="30" fill="url(#gPurple)" stroke="url(#gGold)" stroke-width="1.2"/>
  <!-- Outer surveillance ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="url(#gGold)" stroke-width="0.4" stroke-dasharray="2 3" opacity="0.5"/>
  <!-- Four-pointed Derafsh star -->
  <path d="M32 4 L36 26 L58 32 L36 38 L32 60 L28 38 L6 32 L28 26 Z" fill="url(#gRed)" opacity="0.75"/>
  <!-- Inner pyramid / diamond -->
  <path d="M32 14 L42 32 L32 50 L22 32 Z" fill="url(#gPurple)" stroke="url(#gGold)" stroke-width="0.7"/>
  <!-- All-seeing eye glow -->
  <ellipse cx="32" cy="32" rx="12" ry="7" fill="url(#gEyeGlow)"/>
  <!-- Eye shape -->
  <path d="M20 32 Q26 24 32 24 Q38 24 44 32 Q38 40 32 40 Q26 40 20 32 Z" fill="none" stroke="url(#gGold)" stroke-width="1.2"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="5" fill="url(#gRed)" stroke="url(#gGold)" stroke-width="0.6"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="2.2" fill="#0a0a0a"/>
  <!-- Pupil highlight -->
  <circle cx="33" cy="31" r="0.8" fill="#f0d060" opacity="0.7"/>
  <!-- Subtle radiant lines from eye -->
  <g stroke="url(#gGold)" stroke-width="0.4" opacity="0.3">
    <line x1="32" y1="24" x2="32" y2="15"/>
    <line x1="32" y1="40" x2="32" y2="49"/>
    <line x1="20" y1="32" x2="13" y2="32"/>
    <line x1="44" y1="32" x2="51" y2="32"/>
    <line x1="24" y1="26" x2="18" y2="19"/>
    <line x1="40" y1="26" x2="46" y2="19"/>
    <line x1="24" y1="38" x2="18" y2="45"/>
    <line x1="40" y1="38" x2="46" y2="45"/>
  </g>
</svg>
